function render(){
  const g=document.getElementById("toolsGrid"); g.innerHTML="";
  tools.forEach(t=>{
    const d=currentLang==="hi"?t.hi:t.en;
    const div=document.createElement("div");
    div.className="bg-gray-800 hover:bg-gray-700 p-4 rounded-xl border border-gray-700 cursor-pointer";
    div.innerHTML=`<div class="text-xl">${t.icon}</div><h3 class="font-bold mt-2 text-[13px]">${d.t}</h3><p class="text-[11px] text-gray-400 mt-1 leading-5">${d.d}</p><p class="text-[10px] text-orange-400 mt-2">Click to Open →</p>`;
    div.onclick=()=>openModal(t);
    g.appendChild(div);
  });
}
function openModal(t){
  const d=currentLang==="hi"?t.hi:t.en;
  const details=currentLang==="hi"?t.hiDetails:t.enDetails;
  document.getElementById("modalContent").innerHTML=`<div class="text-3xl">${t.icon}</div><h2 class="text-xl font-bold mt-2">${d.t}</h2><div class="text-sm text-gray-300 leading-7 mt-3">${details}</div><p class="text-[11px] text-gray-400 mt-3">${d.d}</p><a href="${t.link}" target="_blank" class="mt-5 block text-center bg-orange-500 p-3 rounded-xl font-bold">Official Website →</a>`;
  document.getElementById("modal").classList.remove("hidden");
}
function closeModal(){document.getElementById("modal").classList.add("hidden");}
function setLang(l){
  currentLang=l;
  document.getElementById("btn-hi").className=l==="hi"?"px-3 py-1 rounded-full text-[10px] bg-orange-500":"px-3 py-1 rounded-full text-[10px] text-gray-400";
  document.getElementById("btn-en").className=l==="en"?"px-3 py-1 rounded-full text-[10px] bg-orange-500":"px-3 py-1 rounded-full text-[10px] text-gray-400";
  document.getElementById("mainTitle").innerText=l==="hi"?"60+ सरकारी टूल्स - एक जगह":"60+ Sarkari Tools - One Place";
  document.getElementById("trustText").innerText=l==="hi"?"पूरे भारत में भरोसेमंद":"Trusted Across India";
  render();
}
render();
let BASE=11111,stored=localStorage.getItem("sarkar_total"),count=stored?parseInt(stored)+1:BASE+200;
localStorage.setItem("sarkar_total",count);
function renderCounter(n){
  const c=document.getElementById("counterDigits"); if(!c) return; c.innerHTML="";
  n.toString().padStart(5,"0").split("").forEach(d=>{
    const b=document.createElement("div"); b.className="counter-font bg-black border border-orange-500/30 text-orange-400 text-lg font-bold w-8 h-10 flex items-center justify-center rounded"; b.innerText=d; c.appendChild(b);
  });
}
renderCounter(count);
