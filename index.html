<!DOCTYPE html><html lang="hi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SarkarSaathi.org - 60+ Sarkari Tools</title><script src="https://cdn.tailwindcss.com"></script><style>.counter-font{font-family:monospace;font-weight:800}</style></head><body class="bg-[#0f172a] text-white">
<header class="sticky top-0 z-50 bg-[#0f172a]/95 backdrop-blur border-b border-orange-500/20">
<div class="max-w-7xl mx-auto px-4 py-4 text-center"><h1 class="text-3xl md:text-4xl font-extrabold"><span class="text-orange-400">Sarkar</span><span class="text-white">Saathi</span><span class="text-orange-400">.org</span></h1><p class="text-[11px] text-gray-400 tracking-widest mt-1">सभी सरकारी योजनाएं एक जगह</p></div>
<div class="border-t border-gray-800/50 py-2 flex justify-center items-center gap-4"><nav class="flex gap-4 text-[11px]"><a href="index.html">Home</a><a href="about.html">About</a><a href="privacy.html">Privacy</a><a href="contact.html">Contact</a><a href="blogs.html" class="text-orange-400 font-bold">Blog</a></nav><div class="flex bg-gray-800 rounded-full p-1 border border-gray-700 ml-4"><button id="btn-hi" onclick="setLang('hi')" class="px-3 py-1 rounded-full text-[10px] font-bold bg-orange-500">हिंदी</button><button id="btn-en" onclick="setLang('en')" class="px-3 py-1 rounded-full text-[10px] font-bold text-gray-400">EN</button></div></div>
</header>
<div class="text-center p-6"><h2 id="mainTitle" class="text-2xl md:text-4xl font-bold">60+ सरकारी टूल्स - एक जगह</h2></div>
<div class="mx-4 md:mx-16 mb-6"><div class="bg-gradient-to-r from-orange-600 to-red-600 p-[1px] rounded-2xl"><div class="bg-black rounded-2xl p-4 flex justify-between items-center"><div class="flex gap-2 items-center"><div class="w-2 h-2 bg-green-400 rounded-full animate-ping"></div><div><p class="text-green-400 text-[9px] font-bold">LIVE</p><p id="trustText" class="text-xs font-bold">पूरे भारत में भरोसेमंद</p></div></div><div class="text-center"><p class="text-[9px] text-orange-300 uppercase">Total Visitors</p><div id="counterDigits" class="flex gap-1 mt-1"></div></div></div></div></div>
<div class="px-4 md:px-10 grid grid-cols-1 md:grid-cols-3 gap-3" id="toolsGrid"></div>
<div class="m-4 p-4 text-center bg-gray-800/30 border border-dashed rounded-xl text-xs">Ad Space 1</div><div class="m-4 p-4 text-center bg-gray-800/30 border border-dashed rounded-xl text-xs">Ad Space 2</div><div class="m-4 p-4 text-center bg-gray-800/30 border border-dashed rounded-xl text-xs">Ad Space 3</div>
<footer class="p-6 bg-black text-center text-[11px] text-gray-500"><div class="flex justify-center gap-3 mb-2"><a href="about.html">About</a><a href="privacy.html">Privacy</a><a href="contact.html">Contact</a><a href="disclaimer.html">Disclaimer</a><a href="blogs.html">Blog</a></div>© 2026 SarkarSaathi.org | contact@sarkarsaathi.org | Private Site</footer>
<div id="modal" class="fixed inset-0 z-[100] hidden"><div class="absolute inset-0 bg-black/80" onclick="closeModal()"></div><div class="relative max-w-2xl mx-auto mt-10 bg-gray-900 border border-orange-500/30 rounded-2xl p-6 m-4 max-h-[85vh] overflow-y-auto"><button onclick="closeModal()" class="absolute top-4 right-4 text-2xl">&times;</button><div id="modalContent"></div></div></div>
<script>
let currentLang='hi';
const tools=[
{icon:"🪪",hi:{t:"आधार कार्ड स्टेटस चेक",d:"UIDAI official link से आधार स्टेटस चेक करे। आधार डाउनलोड, अपडेट, PVC ऑर्डर की पूरी गाइड।",details:"<b>आधार स्टेटस कैसे चेक करे?</b><br>myaadhaar.uidai.gov.in पर जाए।"},en:{t:"Aadhaar Status Check",d:"Check Aadhaar status via UIDAI official link. Full guide for download, update, PVC order.",details:"<b>How to Check Aadhaar Status?</b><br>Go to myaadhaar.uidai.gov.in"},link:"https://myaadhaar.uidai.gov.in/"},
{icon:"💳",hi:{t:"पैन कार्ड अप्लाई",d:"NSDL से नया पैन कार्ड अप्लाई करे, फीस Rs.107। PAN Income Tax और Bank के लिए जरूरी।",details:"PAN Guide"},en:{t:"PAN Card Apply",d:"Apply new PAN card via NSDL, fee Rs.107. PAN mandatory for Income Tax and Bank.",details:"PAN Guide"},link:"https://www.tin-nsdl.com/"},
{icon:"🗳️",hi:{t:"वोटर ID डाउनलोड",d:"NVSP portal से वोटर ID डाउनलोड करे, नया रजिस्ट्रेशन, नाम सुधार और बूथ सर्च।",details:"Voter ID Guide"},en:{t:"Voter ID Download",d:"Download Voter ID from NVSP portal, new registration, correction and booth search.",details:"Voter ID Guide"},link:"https://voters.eci.gov.in/"},
{icon:"🍚",hi:{t:"राशन कार्ड लिस्ट चेक",d:"NFSA लिस्ट में नाम देखे, Delhi, UP, Bihar सब राज्यों की लिस्ट। APL, BPL, AAY।",details:"Ration Card: nfs.delhi.gov.in par District Block FPS select kare. Types APL BPL AAY."},en:{t:"Ration Card List",d:"Check name in NFSA list for Delhi, UP, Bihar all states. APL, BPL, AAY.",details:"Ration Card Guide"},link:"https://nfsa.gov.in/"},
{icon:"🏠",hi:{t:"PM आवास योजना लिस्ट",d:"PMAY Urban और Gramin लिस्ट में नाम चेक करे। गरीबों को घर के लिए 1.2 लाख।",details:"PMAY Guide"},en:{t:"PM Awas Yojana List",d:"Check name in PMAY Urban & Gramin list. Poor get up to 1.2 lakh for house.",details:"PMAY Guide"},link:"https://pmaymis.gov.in/"},
{icon:"💰",hi:{t:"PM किसान स्टेटस",d:"PM Kisan की 3 किस्तों का स्टेटस चेक करे Rs.6000 साल। Beneficiary list।",details:"PM Kisan Guide"},en:{t:"PM Kisan Status",d:"Check PM Kisan 3 installments Rs.6000/year. Beneficiary list.",details:"PM Kisan Guide"},link:"https://pmkisan.gov.in/"},
];
for(let i=0;i<54;i++){tools.push({icon:"📄",hi:{t:`सरकारी टूल ${i+7}`,d:`यह सरकारी टूल ${i+7} है। Official .gov.in लिंक के साथ पूरी हिंदी गाइड, दलालों से बचे खुद करें। लंबी description SEO के लिए।`,details:`टूल ${i+7} की पूरी जानकारी - Official link`},en:{t:`Govt Tool ${i+7}`,d:`This is Govt Tool ${i+7}. Full guide with official .gov.in link. Avoid agents. Long description for SEO.`,details:`Full info about Tool ${i+7}`},link:"https://www.india.gov.in/"});}
function render(){const grid=document.getElementById('toolsGrid');grid.innerHTML='';tools.forEach(t=>{const d=t[currentLang];const div=document.createElement('div');div.className='bg-gray-800 hover:bg-gray-700 p-4 rounded-xl border border-gray-700 cursor-pointer';div.innerHTML=`<div class="text-xl">${t.icon}</div><h3 class="font-bold mt-2 text-[13px]">${d.t}</h3><p class="text-[11px] text-gray-400 mt-1 leading-5">${d.d}</p><p class="text-[10px] text-orange-400 mt-2">Click to Open →</p>`;div.onclick=()=>openModal(t);grid.appendChild(div);});}
function openModal(t){const d=t[currentLang];document.getElementById('modalContent').innerHTML=`<div class="text-3xl">${t.icon}</div><h2 class="text-xl font-bold mt-2">${d.t}</h2><div class="text-sm text-gray-300 leading-7 mt-3">${d.details}</div><p class="text-[11px] text-gray-400 mt-3">${d.d}</p><a href="${t.link}" target="_blank" class="mt-5 block text-center bg-orange-500 p-3 rounded-xl font-bold">🔗 ${currentLang==='hi'?'ऑफिशियल वेबसाइट पे जाए':'Go to Official Website'}</a>`;document.getElementById('modal').classList.remove('hidden');}
function closeModal(){document.getElementById('modal').classList.add('hidden');}
function setLang(l){currentLang=l;document.getElementById('btn-hi').className=l==='hi'?'px-3 py-1 rounded-full text-[10px] font-bold bg-orange-500':'px-3 py-1 rounded-full text-[10px] font-bold text-gray-400';document.getElementById('btn-en').className=l==='en'?'px-3 py-1 rounded-full text-[10px] font-bold bg-orange-500':'px-3 py-1 rounded-full text-[10px] font-bold text-gray-400';document.getElementById('mainTitle').innerText=l==='hi'?'60+ सरकारी टूल्स - एक जगह':'60+ Sarkari Tools - One Place';document.getElementById('trustText').innerText=l==='hi'?'पूरे भारत में भरोसेमंद':'Trusted Across India';render();}
render();
let BASE=11111,stored=localStorage.getItem('sarkar_total'),count=stored?parseInt(stored)+1:BASE+Math.floor(Math.random()*200);localStorage.setItem('sarkar_total',count);function renderCounter(n){const c=document.getElementById('counterDigits');if(!c)return;c.innerHTML='';n.toString().padStart(5,'0').split('').forEach(d=>{const b=document.createElement('div');b.className='counter-font bg-black border border-orange-500/30 text-orange-400 text-lg font-bold w-8 h-10 flex items-center justify-center rounded';b.innerText=d;c.appendChild(b);});}renderCounter(count);
</script></body></html>
