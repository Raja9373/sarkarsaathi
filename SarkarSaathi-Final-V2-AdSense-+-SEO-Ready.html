"},{id:54,emoji:"\uD83C\uDFEA",category:"Business",link:"https://mcdonline.nic.in",hiTitle:"ट्रेड लाइसेंस / Trade License",enTitle:"Trade License",hiShort:"दुकान/व्यापार के लिए MCD ट्रेड लाइसेंस",enShort:"MCD trade license for shop/business"},{id:55,emoji:"\uD83E\uDDEE",category:"Business",link:"https://www.gst.gov.in",hiTitle:"GST रजिस्ट्रेशन / GST Registration",enTitle:"GST Registration",hiShort:"नया GST नंबर 3 दिन में प्राप्त करें",enShort:"Get new GST number in 3 days"},{id:56,emoji:"\uD83C\uDFED",category:"Business",link:"https://udyamregistration.gov.in",hiTitle:"MSME रजिस्ट्रेशन / MSME Registration",enTitle:"MSME Registration",hiShort:"उद्यम आधार MSME सर्टिफिकेट बनाएं",enShort:"Create Udyam Aadhaar MSME certificate"},{id:57,emoji:"\uD83C\uDF3E",category:"Land",link:"https://upbhulekh.gov.in",hiTitle:"खसरा खतौनी चेक / Khasra Khatauni",enTitle:"Khasra Khatauni Check",hiShort:"UP खसरा खतौनी ऑनलाइन देखें",enShort:"View UP Khasra Khatauni online"},{id:58,emoji:"⚡",category:"Bill",link:"https://www.bsesdelhi.com",hiTitle:"बिजली बिल चेक / Electricity Bill",enTitle:"Electricity Bill Check",hiShort:"BSES, Tata Power दिल्ली बिजली बिल देखें",enShort:"Check BSES, Tata Power Delhi electricity bill"},{id:59,emoji:"\uD83C\uDFE0",category:"Certificate",link:"https://edistrict.delhigovt.nic.in",hiTitle:"निवास प्रमाण पत्र / Domicile Certificate",enTitle:"Domicile Certificate",hiShort:"दिल्ली निवास प्रमाण पत्र ऑनलाइन आवेदन",enShort:"Apply online for Delhi domicile certificate"},{id:60,emoji:"\uD83D\uDEA6",category:"Transport",link:"https://parivahan.gov.in/sarathi",hiTitle:"DL स्टेटस चेक / DL Status",enTitle:"DL Status Check",hiShort:"ड्राइविंग लाइसेंस आवेदन स्टेटस ट्रैक करें",enShort:"Track driving licence application status"}];function Ph(e,t){return`${e} भारत सरकार की एक महत्वपूर्ण सेवा है जो हर नागरिक के लिए उपयोगी है। इस टूल की मदद से आप घर बैठे अपना ${t} से जुड़ा काम बिना किसी दलाल के कर सकते हैं। सरकार ने इसे पूरी तरह डिजिटल बनाया है ताकि पारदर्शिता बनी रहे और भ्रष्टाचार खत्म हो। आप पात्र हैं तो तुरंत आवेदन करें और सरकारी लाभ सीधे अपने बैंक खाते में प्राप्त करें। समय पर आवेदन करने से आपका पैसा और समय दोनों बचते हैं।`}function _h(e,t){return`${e} is a crucial Government of India service useful for every citizen. With this tool you can complete your ${t} related work from home without any middleman. The government has made it fully digital to ensure transparency and remove corruption. If you are eligible, apply immediately and get benefits directly in your bank account. Applying on time saves both your money and effort.`}var Lh=Eh.map((e)=>({id:e.id,emoji:e.emoji,category:e.category,link:e.link,hi:{title:e.hiTitle,shortDesc:e.hiShort,longDesc:Ph(e.hiTitle.split("/")[0].trim(),e.category)},en:{title:e.enTitle,shortDesc:e.enShort,longDesc:_h(e.enTitle,e.category)},docsHi:xh,docsEn:Ch,stepsHi:Nh,stepsEn:Th})),Ah=[{id:1,emoji:"\uD83D\uDCF2",date:"15 Jan 2025",readTime:"5 min",hi:{title:"आधार में मोबाइल नंबर कैसे जोड़े 2026 - ऑनलाइन और ऑफलाइन तरीका",excerpt:"घर बैठे आधार में मोबाइल लिंक करने का पूरा प्रोसेस",content:`परिचय:
आधार कार्ड आज भारत में सबसे जरूरी दस्तावेज बन गया है। बैंक खाता खोलना हो, सिम लेना हो या सरकारी योजना का लाभ लेना हो - हर जगह आधार और उसमें लिंक मोबाइल नंबर चाहिए। अगर आपके आधार में मोबाइल नंबर नहीं जुड़ा है तो आपको कई सरकारी सेवाओं में OTP वेरिफिकेशन में दिक्कत होगी।

आधार में मोबाइल लिंक क्यों जरूरी है?
1. सभी सरकारी सेवाएं जैसे PM Kisan, Ration eKYC, PF निकासी में OTP आपके आधार लिंक मोबाइल पर आता है
2. mAadhaar ऐप और UIDAI पोर्टल पर लॉगिन के लिए मोबाइल जरूरी
3. बिना मोबाइल के आप आधार डाउनलोड नहीं कर सकते

योग्यता:
- आपके पास वैध आधार कार्ड होना चाहिए
- आपके पास नया मोबाइल नंबर होना चाहिए जो पहले किसी और आधार में बहुत बार इस्तेमाल न हुआ हो
- 18 साल से कम उम्र के बच्चों के लिए माता-पिता का मोबाइल चल सकता है

जरूरी दस्तावेज:
- आधार कार्ड की फोटोकॉपी
- नया मोबाइल नंबर
- आधार अपडेट फॉर्म (ऑफलाइन के लिए)

ऑनलाइन तरीका (सीमित):
UIDAI ने सुरक्षा कारणों से मोबाइल नंबर अपडेट को पूरी तरह ऑनलाइन बंद कर रखा है। आप ऑनलाइन सिर्फ अपॉइंटमेंट बुक कर सकते हैं। myaadhaar.uidai.gov.in पर जाकर Book an Appointment पर क्लिक करें, अपने नजदीकी आधार सेवा केंद्र को चुनें और स्लॉट बुक करें।

ऑफलाइन तरीका - स्टेप बाय स्टेप:
स्टेप 1: अपने नजदीकी आधार सेवा केंद्र या बैंक में आधार काउंटर पर जाएं। सुबह 10 बजे जाना बेहतर रहता है भीड़ कम होती है।
स्टेप 2: काउंटर से आधार अपडेट / करेक्शन फॉर्म लें और उसमें मोबाइल नंबर अपडेट वाले कॉलम में नया नंबर लिखें
स्टेप 3: ऑपरेटर आपका बायोमेट्रिक (फिंगरप्रिंट और आंख) लेगा और नया नंबर सिस्टम में डालेगा
स्टेप 4: 50 रुपये फीस जमा करें, आपको URN नंबर वाली रसीद मिलेगी
स्टेप 5: 2-5 दिन में आपका नंबर अपडेट हो जाएगा, URN से स्टेटस चेक कर सकते हैं https://myaadhaar.uidai.gov.in/check-aadhaar-status पर

फीस और समय:
सरकारी फीस सिर्फ 50 रुपये है। कोई अतिरिक्त पैसा न दें। आमतौर पर 72 घंटों में अपडेट हो जाता है।

महत्वपूर्ण टिप्स:
- कभी भी अनजान व्यक्ति को अपना आधार OTP शेयर न करें
- एक मोबाइल नंबर अधिकतम 10 आधार में लिंक हो सकता है
- अपडेट के बाद 30 दिन तक पुराना नंबर भी एक्टिव रह सकता है
- अगर URN खो जाए तो 1947 पर कॉल करें

हेल्पलाइन:
UIDAI हेल्पलाइन 1947 (टोल फ्री), Email: help@uidai.gov.in

निष्कर्ष:
आधार में मोबाइल लिंक करना बहुत आसान है और सिर्फ 10 मिनट का काम है। इसे टालें नहीं क्योंकि भविष्य की सभी सरकारी सेवाएं इसी पर आधारित होंगी। आज ही अपने नजदीकी केंद्र पर जाकर इसे पूरा करें।`},en:{title:"How to Link Mobile Number in Aadhaar 2026 - Online & Offline Method",excerpt:"Complete process to link mobile number to Aadhaar from home",content:`Introduction:
Aadhaar has become the most important document in India. Whether you want to open a bank account, get a SIM or avail government schemes - everywhere you need Aadhaar and a linked mobile number. If your mobile is not linked, you will face OTP verification issues.

Why Mobile Link is Mandatory?
1. All govt services like PM Kisan, Ration eKYC, PF withdrawal need OTP on Aadhaar-linked mobile
2. mAadhaar app and UIDAI portal login requires mobile
3. Without mobile you cannot download Aadhaar

Eligibility:
- You must have a valid Aadhaar
- You must have a new mobile number not overused
- For children below 18, parent's mobile can be used

Documents Required:
- Photocopy of Aadhaar
- New mobile number
- Aadhaar update form for offline

Online Method (Limited):
Due to security reasons UIDAI has disabled complete online mobile update. You can only book appointment online. Go to myaadhaar.uidai.gov.in, click Book an Appointment, choose nearest center and book slot.

Offline Method Step by Step:
Step 1: Visit nearest Aadhaar Seva Kendra or bank Aadhaar counter. Going at 10 AM is best due to less rush.
Step 2: Take Aadhaar update/correction form and write new number in mobile update column
Step 3: Operator will take your biometric (fingerprint and iris) and enter new number
Step 4: Pay Rs 50 fee, you will get receipt with URN number
Step 5: Your number will be updated in 2-5 days, check status with URN at https://myaadhaar.uidai.gov.in/check-aadhaar-status

Fees and Time:
Govt fee is only Rs 50. Don't pay extra. Usually updated within 72 hours.

Important Tips:
- Never share your Aadhaar OTP with unknown person
- One mobile can be linked with max 10 Aadhaars
- After update old number may remain active for 30 days
- If URN lost call 1947

Helpline:
UIDAI Helpline 1947 toll free, Email: help@uidai.gov.in

Conclusion:
Linking mobile in Aadhaar is very easy and takes only 10 minutes. Don't postpone because all future govt services will be based on it. Visit your nearest center today and complete it.`}},{id:2,emoji:"\uD83D\uDCB3",date:"18 Jan 2025",readTime:"6 min",hi:{title:"पैन कार्ड खो जाए तो क्या करें? डुप्लीकेट कैसे निकाले",excerpt:"पैन कार्ड गुम होने पर तुरंत करें ये 4 काम",content:`परिचय: पैन कार्ड खोना आम बात है लेकिन घबराने की जरूरत नहीं है। आयकर विभाग ने डुप्लीकेट पैन निकालना बहुत आसान बना दिया है।

क्या करें जब पैन खो जाए?
सबसे पहले अपने नजदीकी पुलिस स्टेशन में FIR नहीं, बल्कि General Diary में एंट्री कराएं। इससे कोई आपके पैन का गलत इस्तेमाल करे तो आप सुरक्षित रहेंगे।

पात्रता: जिसका पैन पहले से बना है वही डुप्लीकेट के लिए आवेदन कर सकता है।

दस्तावेज: आधार कार्ड, एक पासपोर्ट फोटो, और पुराने पैन की कॉपी अगर है।

स्टेप बाय स्टेप प्रोसेस:
1. tin-nsdl.com पर जाएं और Reprint of PAN Card पर क्लिक करें
2. अपना पैन नंबर, आधार नंबर और जन्मतिथि डालें
3. 50 रुपये ऑनलाइन फीस भरें
4. आधार OTP से eKYC करें, फिजिकल डॉक्यूमेंट भेजने की जरूरत नहीं
5. 7-10 दिन में नया पैन कार्ड आपके घर डाक से आ जाएगा, और e-PAN तुरंत ईमेल पर

फीस: भारत के अंदर 50 रु + GST, विदेश के लिए 1015 रु

समय: e-PAN 2 घंटे में, फिजिकल कार्ड 7-15 दिन

टिप्स: अपना पैन नंबर हमेशा मोबाइल में सेव रखें, DigiLocker में भी सेव करें, कभी भी किसी को पैन की फोटो बिना वॉटरमार्क के न भेजें।

हेल्पलाइन: 020-27218080

निष्कर्ष: पैन खोने पर नया पैन न बनवाएं, सिर्फ Reprint कराएं नहीं तो 10000 जुर्माना लग सकता है।`},en:{title:"What to Do If PAN Card is Lost? How to Get Duplicate",excerpt:"Do these 4 things immediately if PAN is lost",content:`Introduction: Losing PAN card is common but no need to panic. Income Tax Dept has made duplicate PAN very easy.

What to do when PAN lost?
First file a General Diary entry (not FIR) at nearest police station. This keeps you safe if someone misuses your PAN.

Eligibility: Only person whose PAN already exists can apply for duplicate.

Documents: Aadhaar, one passport photo, and copy of old PAN if available.

Step by Step:
1. Go to tin-nsdl.com and click Reprint of PAN Card
2. Enter PAN number, Aadhaar number and DOB
3. Pay Rs 50 online fee
4. Do eKYC with Aadhaar OTP, no need to send physical docs
5. New PAN will come to your home by post in 7-10 days, and e-PAN instantly on email

Fees: Rs 50 + GST for India, Rs 1015 for abroad

Time: e-PAN in 2 hours, physical 7-15 days

Tips: Always save PAN number in mobile, save in DigiLocker, never send PAN photo without watermark.

Helpline: 020-27218080

Conclusion: Don't make new PAN when lost, only reprint else penalty of 10000 can be imposed.`}},{id:3,emoji:"⚡",date:"20 Jan 2025",readTime:"5 min",hi:{title:"दिल्ली बिजली बिल कैसे देखें - BSES राजधानी यमुना Tata Power",excerpt:"मोबाइल से 2 मिनट में बिजली बिल चेक करें",content:`परिचय: दिल्ली में BSES राजधानी, BSES यमुना और Tata Power तीन कंपनियां बिजली देती हैं। अब लाइन में लगने की जरूरत नहीं।

क्यों ऑनलाइन चेक करें?
- बिल खो जाए तो डुप्लीकेट तुरंत
- पिछले 6 महीने का इतिहास

Conclusion: Checking bill from mobile is fastest and safest.`}},{id:4,emoji:"\uD83D\uDDF3️",date:"22 Jan 2025",readTime:"4 min",hi:{title:"वोटर ID में नाम कैसे जोड़े - NVSP से ऑनलाइन",excerpt:"नया वोटर कार्ड 15 दिन में घर बैठे",content:`परिचय: 18 साल पूरा होते ही वोटर ID बनवाना जरूरी है। अब NVSP पोर्टल से घर बैठे बनता है।

Helpline: 1950

Conclusion: Voting is a right in democracy, apply today.`}},{id:5,emoji:"\uD83C\uDF5A",date:"25 Jan 2025",readTime:"5 min",hi:{title:"राशन कार्ड स्टेटस कैसे चेक करें NFSA लिस्ट",excerpt:"NFSA लिस्ट में नाम है या नहीं 2 मिनट में पता करें",content:`परिचय: राशन कार्ड गरीब परिवारों के लिए जीवन रेखा है। सरकार हर महीने 5 किलो अनाज फ्री दे रही है।

निष्कर्ष: हर महीने लिस्ट अपडेट होती है, चेक करते रहें।`},en:{title:"How to Check Ration Card Status NFSA List",excerpt:"Check if name is in NFSA list in 2 minutes",content:`Intro: Ration card is lifeline for poor families. Govt gives 5 kg grains free every month.

Docs: Many states allow search via Aadhaar number

Time: Instant

Tips: If name not there contact dealer, eKYC is mandatory else ration will stop.

Helpline: 1967

Conclusion: List updates every month, keep checking.`}},{id:6,emoji:"\uD83C\uDF31",date:"28 Jan 2025",readTime:"6 min",hi:{title:"PM किसान योजना - 13वीं किस्त कब आएगी? स्टेटस चेक",excerpt:"2000 रुपये की किस्त का इंतजार खत्म, ऐसे चेक करें",content:`परिचय: PM Kisan योजना में हर किसान को साल में 6000 रुपये तीन किस्तों में मिलते हैं।

13वीं किस्त अपडेट:
सरकार ने फरवरी 2025 में 13वीं किस्त जारी करने की तैयारी की है। जिन किसानों ने eKYC और भू-सत्यापन कर लिया है उन्हीं को पैसा मिलेगा।

- 2 हेक्टेयर तक जमीन वाला किसान
- आधार बैंक से लिंक हो
- eKYC पूरा हो

eKYC कैसे करें?
pmkisan.gov.in पर eKYC पर क्लिक करें, आधार नंबर डालें, OTP से वेरिफाई करें

स्टेटस चेक:
1. pmkisan.gov.in पर Beneficiary Status पर जाएं
2. आधार या मोबाइल नंबर डालें
3. पूरा इतिहास दिखेगा - कौन सी किस्त कब आई, कौन सी रुकी

अगर किस्त रुकी है तो:
- बैंक आधार लिंक चेक करें
- Land Seeding Yes होना चाहिए
- eKYC Yes होना चाहिए

हेल्पलाइन: 155261

निष्कर्ष: समय पर eKYC कराएं ताकि किस्त न रुके।`},en:{title:"PM Kisan Yojana - When will 13th Installment Come? Status Check",excerpt:"Wait for Rs 2000 installment over, check like this",content:`Intro: In PM Kisan scheme every farmer gets Rs 6000 per year in three installments.

13th Installment Update:
Govt has prepared to release 13th installment in Feb 2025. Only farmers who completed eKYC and land verification will get money.

Eligibility:
- Farmer with up to 2 hectare land
- Aadhaar linked to bank
- eKYC completed

How to do eKYC?
Go to pmkisan.gov.in click eKYC, enter Aadhaar, verify with OTP

Status Check:
1. Go to Beneficiary Status on pmkisan.gov.in
2. Enter Aadhaar or mobile
3. Full history will show - which installment when came, which stopped

If installment stopped:
- Check bank Aadhaar link
- Land Seeding should be Yes
- eKYC should be Yes

Helpline: 155261

Conclusion: Do eKYC on time so installment doesn't stop.`}},{id:7,emoji:"\uD83C\uDFE5",date:"30 Jan 2025",readTime:"7 min",hi:{title:"आयुष्मान कार्ड कैसे बनाएं - 5 लाख फ्री इलाज",excerpt:"घर बैठे 5 लाख का हेल्थ बीमा कार्ड बनाएं",content:`परिचय: आयुष्मान भारत योजना दुनिया की सबसे बड़ी हेल्थ योजना है। इसमें 5 लाख तक का इलाज फ्री होता है।

- फोटो

2. Beneficiary पर क्लिक करें, मोबाइल से लॉगिन करें
3. आधार से eKYC करें

तरीका 2 - CSC केंद्र:
नजदीकी जन सेवा केंद्र पर जाएं, ऑपरेटर 30 रु में बना देगा

फायदे:
- 5 लाख तक फ्री इलाज सरकारी और प्राइवेट अस्पताल में
- कैंसर, दिल, किडनी सब कवर
- पूरे भारत में कहीं भी इलाज

लिस्ट में नाम कैसे देखें?
Same वेबसाइट पर Check Eligibility में आधार डालें

टिप्स: कार्ड पर QR कोड होता है, अस्पताल में वही दिखाना है, हर साल रिन्यू की जरूरत नहीं

निष्कर्ष: हर गरीब परिवार को यह कार्ड जरूर बनवाना चाहिए, यह जीवन बचाता है।`},en:{title:"How to Make Ayushman Card - 5 Lakh Free Treatment",excerpt:"Make 5 lakh health insurance card from home",content:`Intro: Ayushman Bharat is world's largest health scheme. It gives free treatment up to 5 lakh.

- Ration card holders eligible in many states
- Any 70+ senior now eligible (new rule)

- Aadhaar
- Ration card
- Mobile
- Photo

2 Methods:
Method 1 - Online:
1. Go to beneficiary.nha.gov.in
2. Click Beneficiary, login with mobile
3. Do eKYC with Aadhaar
4. Choose family member, take photo
5. Submit, instantly download e-Card

Method 2 - CSC Center:
Go to nearest Jan Seva Kendra, operator will make for Rs 30

Benefits:
- Free treatment up to 5 lakh in govt and private hospitals
- Cancer, heart, kidney all covered
- Treatment anywhere in India

Tips: Card has QR code, show that in hospital, no need to renew every year

Helpline: 14555

Conclusion: Every poor family must make this card, it saves lives.`}},{id:8,emoji:"\uD83D\uDC77",date:"02 Feb 2025",readTime:"5 min",hi:{title:"ई-श्रम कार्ड के फायदे - 2 लाख बीमा + पेंशन",excerpt:"मजदूरों के लिए सरकार की सबसे बड़ी योजना",content:`परिचय: देश में 40 करोड़ असंगठित मजदूर हैं। उनके लिए सरकार ने ई-श्रम योजना शुरू की।

2. 60 साल बाद 3000 रु महीना पेंशन (PM-SYM के साथ)
3. सभी सरकारी योजनाओं का सीधा लाभ

- EPFO/ESIC मेंबर न हो
- इनकम टैक्स न भरता हो

बनाने का तरीका:
1. eshram.gov.in पर जाएं
2. Register on e-Shram पर क्लिक करें
3. आधार लिंक मोबाइल से OTP वेरिफाई
4. व्यक्तिगत जानकारी, काम, बैंक डिटेल भरें
5. सबमिट, तुरंत UAN कार्ड डाउनलोड

हेल्पलाइन: 14434

निष्कर्ष: हर मजदूर को यह कार्ड जरूर बनवाना चाहिए।`},en:{title:"e-Shram Card Benefits - 2 Lakh Insurance + Pension",excerpt:"Biggest scheme for labourers by government",content:`Intro: There are 40 crore unorganized workers in country. Govt started e-Shram for them.

2. Rs 3000 monthly pension after 60 (with PM-SYM)
3. Direct benefit of all govt schemes

- Age 16-59
- Work in unorganized sector (rickshaw, farm, domestic, carpenter)
- Not EPFO/ESIC member
- Not income taxpayer

Docs: Aadhaar, bank account, mobile

How to make:
1. Go to eshram.gov.in
2. Click Register on e-Shram
3. Verify OTP with Aadhaar linked mobile
4. Fill personal, work, bank details
5. Submit, instantly download UAN card

Fees: Free, Rs 20 at CSC

Tips: Always keep card in pocket, update profile every 6 months

Helpline: 14434

Conclusion: Every labourer must make this card.`}},{id:9,emoji:"\uD83D\uDE97",date:"05 Feb 2025",readTime:"6 min",hi:{title:"ड्राइविंग लाइसेंस ऑनलाइन अप्लाई - लर्निंग + परमानेंट",excerpt:"घर बैठे DL के लिए अप्लाई करें, RTO के चक्कर खत्म",content:`परिचय: अब DL के लिए RTO में दलाल को 2000 देने की जरूरत नहीं। पूरी प्रक्रिया ऑनलाइन है।

1. parivahan.gov.in/sarathi पर जाएं, अपना राज्य चुनें
2. New Learners Licence पर क्लिक करें
3. आधार eKYC से फॉर्म भरें
4. 200 रु फीस ऑनलाइन भरें
5. ऑनलाइन टेस्ट की स्लॉट बुक करें - 10 सवाल में 6 सही तो पास
6. पास होते ही लर्निंग लाइसेंस डाउनलोड

परमानेंट लाइसेंस:
लर्निंग के 30 दिन बाद Same पोर्टल पर New Driving Licence पर अप्लाई करें, ड्राइविंग टेस्ट के लिए RTO जाना होगा, टेस्ट पास तो 7 दिन में DL घर

टिप्स: टेस्ट से पहले यूट्यूब पर RTO टेस्ट वीडियो देखें, 8 बनाना सीखें

निष्कर्ष: ऑनलाइन DL बनवाना सस्ता और पारदर्शी है।`},en:{title:"Driving Licence Online Apply - Learning + Permanent",excerpt:"Apply for DL from home, no RTO rounds",content:`Intro: Now no need to pay Rs 2000 to agent for DL. Full process is online.

- Learning Licence (valid 6 months)
- Permanent Licence

Eligibility:
- For learning 18 years (geared bike/car), 16 years (non-geared)
- For permanent 30 days after learning

4. Pay Rs 200 fee online
5. Book slot for online test - 6 correct out of 10 to pass

Fees: Learning 200, Permanent 300, total ~500

Tips: Watch RTO test videos on YouTube before test, learn 8 shape

Helpline: 0120-4925505

Conclusion: Online DL is cheap and transparent.`}},{id:10,emoji:"\uD83C\uDFC6",date:"10 Feb 2025",readTime:"8 min",hi:{title:"Top 10 सरकारी योजना 2025 - जो 80% लोग मिस कर देते हैं",excerpt:"इन 10 योजनाओं से हर साल 50000 तक का फायदा",content:`परिचय: भारत सरकार 300 से ज्यादा योजनाएं चलाती है लेकिन लोगों को पता नहीं होता। हम लाए हैं Top 10 जिनका फायदा आप आज ही ले सकते हैं।

SarkarSaathi.org पर हर योजना का डायरेक्ट लिंक दिया है। किसी भी योजना पर क्लिक करें, आधिकारिक वेबसाइट खुलेगी, वहां से फ्री में अप्लाई करें।

- दलाल को पैसा देना - सभी योजनाएं फ्री हैं

4. Sukanya Samriddhi - 8% interest: Best investment for daughter. Opens in post office
5. PM Awas - 2.5 lakh subsidy: House for poor. pmaymis.gov.in
6. Ujjwala - Free gas connection: For women. pmuy.gov.in
7. Scholarship - Up to 50000: For students. scholarships.gov.in
8. MGNREGA - 100 days employment: For villagers. nrega.nic.in
9. Widow/Old Age Pension - 1500 monthly: nsap.nic.in
10. MSME Udyam - Loan without guarantee: For businessmen. udyamregistration.gov.in

How to apply?
On SarkarSaathi.org we have given direct link for every scheme. Click any scheme, official website will open, apply free from there.

Common mistakes people do:
- Paying agent - all schemes are free
- Not doing eKYC - installment stops
- Wrong documents - keep Aadhaar and bank linked

Tips: Every scheme has different eligibility, read first then apply. One family can take benefit of many schemes together.

Helpline: Every scheme has separate helpline given on our website
